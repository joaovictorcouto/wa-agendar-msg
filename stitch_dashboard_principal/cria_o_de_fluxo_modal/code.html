<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WA Scheduler - Flow Creation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#d9ffef",
              "surface-container": "#172127",
              "secondary-fixed": "#92f5d9",
              "tertiary": "#bcc8cf",
              "primary-fixed-dim": "#59dcb5",
              "on-primary-fixed-variant": "#00513e",
              "primary-container": "#008064",
              "surface-bright": "#303b41",
              "surface-container-low": "#131d23",
              "secondary-container": "#03816a",
              "background": "#0a151a",
              "on-primary": "#00382a",
              "on-error-container": "#ffdad6",
              "on-secondary-container": "#e1fff3",
              "inverse-on-surface": "#283238",
              "surface-container-high": "#212b32",
              "outline-variant": "#3e4945",
              "surface-tint": "#59dcb5",
              "surface-container-highest": "#2c363d",
              "on-tertiary-container": "#eef8ff",
              "on-tertiary-fixed": "#121d22",
              "on-secondary": "#00382c",
              "secondary-fixed-dim": "#76d8bd",
              "on-surface": "#d9e4ec",
              "inverse-surface": "#d9e4ec",
              "inverse-primary": "#006b53",
              "outline": "#87938e",
              "surface": "#0a151a",
              "primary-fixed": "#79f9d0",
              "surface-variant": "#2c363d",
              "on-tertiary": "#273238",
              "tertiary-fixed": "#d8e4ec",
              "error-container": "#93000a",
              "on-secondary-fixed-variant": "#005141",
              "surface-dim": "#0a151a",
              "on-error": "#690005",
              "on-background": "#d9e4ec",
              "on-tertiary-fixed-variant": "#3d484e",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#bcc8cf",
              "on-secondary-fixed": "#002019",
              "primary": "#59dcb5",
              "tertiary-container": "#677379",
              "on-primary-fixed": "#002117",
              "secondary": "#76d8bd",
              "surface-container-lowest": "#060f15",
              "on-surface-variant": "#bdc9c4"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b141a; /* Native WhatsApp Dark Background */
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374045;
            border-radius: 10px;
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>
<!-- Main Flow Creation Modal -->
<div class="relative z-50 w-full max-w-[560px] bg-surface-variant rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[921px]">
<!-- Header -->
<header class="bg-[#008069] text-white flex items-center justify-between px-6 py-4 shadow-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="schedule">schedule</span>
<h1 class="font-headline font-bold text-lg tracking-tight">Criar Novo Fluxo</h1>
</div>
<button class="hover:bg-white/10 p-1 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
<!-- Recipient Information Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-[0.6875rem] uppercase tracking-wider font-semibold text-secondary font-label">Contact Name</label>
<div class="bg-surface-container-highest p-3 rounded-lg border-l-2 border-primary">
<input class="bg-transparent border-none w-full focus:ring-0 text-on-surface font-medium" readonly="" type="text" value="Rodrigo Oliveira"/>
</div>
</div>
<div class="space-y-1">
<label class="text-[0.6875rem] uppercase tracking-wider font-semibold text-secondary font-label">Phone Number</label>
<div class="bg-surface-container-highest p-3 rounded-lg border-l-2 border-primary">
<input class="bg-transparent border-none w-full focus:ring-0 text-on-surface font-medium" readonly="" type="text" value="+55 11 99999-0000"/>
</div>
</div>
</div>
<!-- Flow Messages Section -->
<div class="space-y-4">
<div class="flex items-center justify-between border-b border-outline-variant pb-2">
<h2 class="font-headline font-bold text-on-surface">Mensagens do Fluxo</h2>
<span class="bg-primary/10 text-primary text-[0.6875rem] font-bold px-2 py-0.5 rounded uppercase tracking-tighter">Timeline</span>
</div>
<!-- Draggable Card 1 -->
<div class="relative pl-6">
<div class="absolute left-[7px] top-0 bottom-0 w-[2px] bg-outline-variant/30"></div>
<div class="absolute left-0 top-4 w-4 h-4 rounded-full border-2 border-primary bg-surface-variant z-10"></div>
<div class="bg-surface-container-low p-4 rounded-xl border border-transparent hover:border-outline-variant transition-all duration-300 group shadow-md">
<div class="flex items-center justify-between mb-3">
<span class="material-symbols-outlined text-outline cursor-grab active:cursor-grabbing" data-icon="drag_indicator">drag_indicator</span>
<button class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>
</button>
</div>
<textarea class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-body-md text-on-surface focus:ring-1 focus:ring-primary min-h-[80px] resize-none mb-4" placeholder="Digite sua mensagem aqui...">Olá Rodrigo, tudo bem? Vi seu interesse em nosso produto e gostaria de agendar uma demonstração.</textarea>
<div class="flex items-center gap-4">
<div class="flex-1 space-y-1">
<label class="text-[0.625rem] text-outline font-label uppercase">Atraso (Dias)</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-2 text-sm focus:ring-1 focus:ring-primary" type="number" value="0"/>
</div>
<div class="flex-1 space-y-1">
<label class="text-[0.625rem] text-outline font-label uppercase">Atraso (Segundos)</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-2 text-sm focus:ring-1 focus:ring-primary" type="number" value="30"/>
</div>
</div>
</div>
</div>
<!-- Draggable Card 2 -->
<div class="relative pl-6">
<div class="absolute left-[7px] top-0 bottom-0 w-[2px] bg-outline-variant/30"></div>
<div class="absolute left-0 top-4 w-4 h-4 rounded-full border-2 border-outline bg-surface-variant z-10"></div>
<div class="bg-surface-container-low p-4 rounded-xl border border-transparent hover:border-outline-variant transition-all duration-300 group shadow-md">
<div class="flex items-center justify-between mb-3">
<span class="material-symbols-outlined text-outline cursor-grab active:cursor-grabbing" data-icon="drag_indicator">drag_indicator</span>
<button class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>
</button>
</div>
<textarea class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-body-md text-on-surface focus:ring-1 focus:ring-primary min-h-[80px] resize-none mb-4" placeholder="Digite sua mensagem aqui...">Ainda aguardando sua resposta! Caso tenha alguma dúvida, estou por aqui.</textarea>
<div class="flex items-center gap-4">
<div class="flex-1 space-y-1">
<label class="text-[0.625rem] text-outline font-label uppercase">Atraso (Dias)</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-2 text-sm focus:ring-1 focus:ring-primary" type="number" value="1"/>
</div>
<div class="flex-1 space-y-1">
<label class="text-[0.625rem] text-outline font-label uppercase">Atraso (Segundos)</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-2 text-sm focus:ring-1 focus:ring-primary" type="number" value="0"/>
</div>
</div>
</div>
</div>
<!-- Add Message Button -->
<div class="pl-6">
<button class="flex items-center gap-2 text-primary font-bold text-sm hover:bg-primary/5 px-4 py-2 rounded-lg transition-all border border-dashed border-primary/30 w-full justify-center">
<span class="material-symbols-outlined" data-icon="add">add</span>
                        Adicionar Mensagem
                    </button>
</div>
</div>
<!-- Native Style Toggle -->
<div class="flex items-center justify-between bg-surface-container-low p-4 rounded-xl border border-outline-variant/20 shadow-sm mt-8">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="smart_toy">smart_toy</span>
<div>
<p class="text-sm font-bold">Pausar se responder</p>
<p class="text-xs text-outline">Interrompe o fluxo automaticamente ao receber retorno.</p>
</div>
</div>
<!-- Native-ish Toggle -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-outline after:border-outline after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container peer-checked:after:bg-white peer-checked:after:border-transparent"></div>
</label>
</div>
</div>
<!-- Footer Actions -->
<footer class="p-6 bg-surface-container-low border-t border-outline-variant/10">
<button class="w-full bg-primary-container hover:bg-[#00a884] text-on-primary-container font-bold py-4 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-black/20">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Salvar Fluxo
            </button>
<p class="text-center text-[0.625rem] text-outline mt-3 uppercase tracking-widest font-bold">WA Scheduler Engine v2.4</p>
</footer>
</div>
<!-- Background UI Mockup (Simulating Sidebar content under modal) -->
<div class="fixed top-0 left-0 w-80 h-full bg-[#111b21] -z-10 hidden lg:block border-r border-outline-variant/20">
<div class="h-16 bg-[#202c33] flex items-center px-4 gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest"></div>
<div class="flex-1 space-y-2">
<div class="h-2 w-24 bg-surface-container-highest rounded"></div>
<div class="h-2 w-16 bg-surface-container-highest rounded"></div>
</div>
</div>
<div class="p-4 space-y-4">
<div class="h-12 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-12 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-12 w-full bg-surface-container-low rounded-lg opacity-50"></div>
</div>
</div>
</body></html>
